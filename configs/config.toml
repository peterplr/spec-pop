# -------------------
# REQUIRED PATHS
# -------------------
# Paths are relative to this config file.
data_path = "../spectra/file.txt"
#dark_image_path = "../spectra/2026-04-30/dark_image_40ms.txt"
output_dir = "../output/date/"

# -------------------
# OPTIONAL SETTINGS
# -------------------
# These settings control the analysis and plotting behavior.
# If they are not present, the program will use sensible defaults.
[peak_integration]
fwhm_multiplier = 4.0       # Integration window = this * FWHM. Default: 4.0
fwhm_search_window = 10.0   # How far (in nm) to look for a peak when finding FWHM. Default: 10.0
default_width = 10.0        # Fallback width (in nm) if no peak is found. Default: 1.0

[auto_peak]
min_auto_peak_height = 1000  # Minimum counts for auto-detected peaks (after dark subtraction). Default: 100
auto_peak_detection_range_min = 390.0 # Minimum wavelength for auto-peak detection. Default: None (no limit)
auto_peak_detection_range_max = 860.0 # Maximum wavelength for auto-peak detection. Default: None (no limit)
skip_metastables = false
match_tolerance = 1.1
nist_ambiguity_window = 3.0 # Window (in nm) to check for ambiguous/merged peaks in NIST database. Default: 1.0
ignore_wavelengths = []     # List of wavelengths (in nm) to explicitly ignore

[plotting]
plot_margin = 20.0          # Margin on each side of the overview plot. Default: 20.0
plot_overview = true        # Generate the overview plot. Default: true
plot_separate_lines = false # Generate individual plots for each line. Default: true

# -------------------
# DATA FILE PARSING
# -------------------
[parser]
delimiter = "\\s+"
wl_col_name = "Wavelength"
count_col_name = "Counts"

# ----------------------------------------------------------------
# WAVELENGTHS TO ANALYZE
# ----------------------------------------------------------------
# List each wavelength as a separate table.
# If this section is empty or commented out, the program will
# automatically detect peaks above 'min_auto_peak_height' within
# the 'auto_peak_detection_range'.
#
# You can optionally add a 'width' key to manually override the
# automatic peak integration width for a specific line.
# ----------------------------------------------------------------
#[[wavelengths]]
#center = 706.91
#
#[[wavelengths]]
#center = 696.73